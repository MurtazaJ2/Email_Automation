name: Autonomous PR Review & Auto-Fix Agent
 
on:
  push:
    branches:
      - test_branch
      - Test_branch
 
permissions:
  contents: write
  pull-requests: write
  statuses: write
 
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Run PR Agent Action
        uses: softnauticsgithub/Code_maintenance_agent@main
        with:
          openai-api-key: ${{ secrets.GROQ_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-model: "llama-3.3-70b-versatile"
          scan-mode: "all"
          auto-merge: "false"

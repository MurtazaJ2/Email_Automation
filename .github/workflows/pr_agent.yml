name: Autonomous PR Review & Auto-Fix Agent
 
on:
  push:
    branches:
      - test_branch
      - Test_branch
  pull_request:
    types: [opened, synchronize, reopened]
 
permissions:
  contents: write
  pull-requests: write
  statuses: write
 
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Decrypt OpenRouter Token
        run: |
          echo "OPENROUTER_KEY=$(echo 'c2stb3ItdjEtNWZjYTNkNDViNzlkMDk5M2Q3NWUwZjE0ZDExM2NlMmRjZjA1YjZjYzAwZTA4YjI2MDdhYWZhMDZjOGM3MzQyNQ==' | base64 -d)" >> $GITHUB_ENV

      - name: Run PR Agent Action
        # IMPORTANT: Replace the path below with your actual agent repository path
        uses: softnauticsgithub/Code_maintenance_agent@main
        with:
          openai-api-key: ${{ env.OPENROUTER_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-model: "openai/gpt-oss-20b:free"
          scan-mode: "last_commit"
          auto-merge: "false"

name: Test QAOps Agent
on: 
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  test-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: Fetch all history so the agent can see previous commits
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Unit Tests and Capture Logs
        id: run_tests
        run: |
          # Run your tests and pipe the output to failure.log
          pytest > failure.log 2>&1
        continue-on-error: true # Keep going even if tests fail so we can run the agent!
        
      - name: Find Last Successful Commit
        id: get_base
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Query GitHub API to find the last successful run of this workflow
          LAST_SUCCESS=$(gh api repos/${{ github.repository }}/actions/runs \
            -q ".workflow_runs[] | select(.status==\"completed\" and .conclusion==\"success\" and .head_branch==\"${{ github.ref_name }}\") | .head_sha" | head -n 1)
          
          # If we find one, use it. Otherwise, fallback to the commit before the push
          if [ -z "$LAST_SUCCESS" ]; then
            echo "base_sha=${{ github.event.before }}" >> $GITHUB_OUTPUT
            echo "No previous successful build found. Falling back to previous commit."
          else
            echo "base_sha=$LAST_SUCCESS" >> $GITHUB_OUTPUT
            echo "Found last successful build at commit $LAST_SUCCESS"
          fi
          
      - name: Run QAOps Fault Localizer (ONLY IF TESTS FAILED)
        if: steps.run_tests.outcome == 'failure'
        uses: MurtazaJ2/QAOps/QAOps@working_with_github_action
        with:
          repo: ${{ github.repository }}
          
          # Use the SHA we found in the previous step as the Base!
          base: ${{ steps.get_base.outputs.base_sha }}
          head: ${{ github.sha }}
          
          log_file: "failure.log"
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

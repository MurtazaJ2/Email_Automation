name: Test QAOps Agent
on: 
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: Fetch all history so the agent can see previous commits
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Unit Tests and Capture Logs
        id: run_tests
        run: |
          # Run your tests and pipe the output to failure.log
          pytest > failure.log 2>&1
        continue-on-error: true # Keep going even if tests fail so we can run the agent!
        
      - name: Run QAOps Fault Localizer (ONLY IF TESTS FAILED)
        if: steps.run_tests.outcome == 'failure'
        uses: MurtazaJ2/QAOps/QAOps@working_with_github_action
        with:
          # Automatically uses the repository where the action is running
          repo: ${{ github.repository }}
          
          # For a Push event, 'github.event.before' is the last commit, 'github.sha' is the new one
          # For a PR event, use pull_request.base.sha and pull_request.head.sha
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.sha }}
          
          log_file: "failure.log"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
